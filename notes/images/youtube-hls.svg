<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <title>HLS vs Single MP4 — Segment Structure</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b949e"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3fb950"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f85149"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/></marker>
  </defs>
  <rect width="900" height="380" fill="#0d1117"/>
  <text x="450" y="30" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="16" font-weight="700" text-anchor="middle">HLS Segments vs Single MP4</text>

  <!-- LEFT: Single MP4 (bad) -->
  <rect x="20" y="48" width="390" height="310" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <rect x="20" y="48" width="390" height="34" rx="10" fill="#2d0f0f"/>
  <text x="215" y="71" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Single MP4 File</text>

  <!-- Single big bar representing the full file -->
  <rect x="40" y="100" width="350" height="44" rx="6" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
  <text x="215" y="118" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">movie.mp4  (8 GB — full file)</text>
  <text x="215" y="134" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">one monolithic blob</text>

  <!-- Seek problem -->
  <text x="215" y="176" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11" text-anchor="middle">User seeks to 1:30:00</text>
  <rect x="40" y="185" width="350" height="14" rx="3" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <!-- Must buffer all preceding -->
  <rect x="40" y="185" width="262" height="14" rx="3" fill="#f85149" opacity="0.4"/>
  <line x1="302" y1="178" x2="302" y2="205" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="215" y="175" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">must buffer everything before seek point</text>
  <text x="302" y="218" fill="#58a6ff" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">seek point</text>

  <!-- Problems -->
  <rect x="40" y="232" width="350" height="108" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="252" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Problems</text>
  <text x="56" y="272" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">Seeking requires buffering all preceding bytes</text>
  <text x="56" y="292" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">All viewers get same bitrate — no adaptive quality</text>
  <text x="56" y="312" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">CDN must cache the entire 8 GB file per edge node</text>
  <text x="56" y="332" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">One quality level — looks bad on slow networks</text>

  <!-- RIGHT: HLS -->
  <rect x="450" y="48" width="430" height="310" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="450" y="48" width="430" height="34" rx="10" fill="#0f2318"/>
  <text x="665" y="71" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">HLS — Segments (2–10s each)</text>

  <!-- Master manifest -->
  <rect x="610" y="92" width="110" height="34" rx="6" fill="#1a1030" stroke="#a371f7" stroke-width="1.5"/>
  <text x="665" y="107" fill="#a371f7" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle">manifest.m3u8</text>
  <text x="665" y="120" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">master playlist</text>

  <!-- Three resolution tracks -->
  <!-- 360p -->
  <rect x="466" y="150" width="105" height="28" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="518" y="162" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" text-anchor="middle">360p/index.m3u8</text>
  <text x="518" y="173" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">~500 kbps</text>
  <!-- 720p -->
  <rect x="607" y="150" width="115" height="28" rx="5" fill="#21262d" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="664" y="162" fill="#58a6ff" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" text-anchor="middle">720p/index.m3u8</text>
  <text x="664" y="173" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">~2.5 Mbps</text>
  <!-- 1080p -->
  <rect x="756" y="150" width="115" height="28" rx="5" fill="#21262d" stroke="#3fb950" stroke-width="1.2"/>
  <text x="813" y="162" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="10" font-weight="600" text-anchor="middle">1080p/index.m3u8</text>
  <text x="813" y="173" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">~5 Mbps</text>

  <!-- Lines from manifest to tracks -->
  <line x1="640" y1="126" x2="518" y2="148" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="665" y1="126" x2="665" y2="148" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="690" y1="126" x2="813" y2="148" stroke="#8b949e" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Segment bars for 720p (shown as example) -->
  <text x="665" y="202" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle" font-style="italic">example: 720p segments</text>
  <rect x="466" y="210" width="56" height="22" rx="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="494" y="225" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">seg001.ts</text>
  <rect x="526" y="210" width="56" height="22" rx="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="554" y="225" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">seg002.ts</text>
  <rect x="586" y="210" width="56" height="22" rx="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="614" y="225" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">seg003.ts</text>
  <rect x="646" y="210" width="56" height="22" rx="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="674" y="225" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">seg004.ts</text>
  <text x="730" y="225" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">. . .</text>
  <text x="790" y="225" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9">2–10s each</text>

  <!-- Seek arrow on segments -->
  <line x1="614" y1="234" x2="614" y2="250" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="614" y="264" fill="#58a6ff" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">seek → fetch seg003 only</text>

  <!-- Benefits -->
  <rect x="466" y="278" width="395" height="62" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="663" y="296" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Benefits</text>
  <text x="482" y="316" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">Seek instantly — player fetches only the segment at that timestamp</text>
  <text x="482" y="333" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11">Player switches resolution based on bandwidth (Adaptive Bitrate)</text>
</svg>
