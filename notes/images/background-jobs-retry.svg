<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <title>Background Jobs Retry and DLQ</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
  </defs>
  <!-- background -->
  <rect width="900" height="400" fill="#0d1117"/>
  <text x="450" y="30" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#e6edf3" font-weight="700">Background Jobs — Retry &amp; Dead Letter Queue</text>
  <rect x="360" y="55" width="140" height="36" rx="8" fill="#1f6feb" stroke="#30363d" stroke-width="1.2"/>
  <text x="430.0" y="78.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Job Enqueued</text>
  <rect x="360" y="115" width="140" height="36" rx="8" fill="#1f6feb" stroke="#30363d" stroke-width="1.2"/>
  <text x="430.0" y="138.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Worker picks up</text>
  <rect x="360" y="175" width="140" height="36" rx="8" fill="#1f6feb" stroke="#30363d" stroke-width="1.2"/>
  <text x="430.0" y="198.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Process job</text>
  <rect x="360" y="240" width="140" height="36" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="430.0" y="263.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Retry after 1s</text>
  <rect x="360" y="295" width="140" height="36" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="430.0" y="318.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Retry after 2s</text>
  <rect x="360" y="350" width="140" height="36" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="430.0" y="373.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Retry after 4s</text>
  <line x1="430.0" y1="91" x2="430.0" y2="113" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="430.0" y1="151" x2="430.0" y2="173" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="430.0" y1="211" x2="430.0" y2="238" stroke="#f85149" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <text x="450.0" y="224.5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">FAIL</text>
  <line x1="430.0" y1="276" x2="430.0" y2="293" stroke="#f85149" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <text x="450.0" y="284.5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">FAIL</text>
  <line x1="430.0" y1="331" x2="430.0" y2="348" stroke="#f85149" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <text x="450.0" y="339.5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">FAIL</text>
  <rect x="330" y="406" width="200" height="44" rx="8" fill="#f85149" opacity="0.85" stroke="#30363d" stroke-width="1.5"/>
  <text x="430" y="424" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="700">Dead Letter Queue 🚨</text>
  <text x="430" y="440" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">MAX RETRIES REACHED</text>
  <line x1="430.0" y1="386" x2="430.0" y2="404" stroke="#f85149" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <line x1="500" y1="193.0" x2="558" y2="193.0" stroke="#3fb950" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="529.0" y="183.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#3fb950">SUCCESS</text>
  <rect x="560" y="175" width="120" height="36" rx="8" fill="#3fb950" stroke="#30363d" stroke-width="1.2"/>
  <text x="620" y="198.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#e6edf3" font-weight="700">Done ✅</text>
  <text x="600" y="240" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#f0883e" font-weight="600">Exponential Backoff</text>
  <text x="600" y="262" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">Attempt 1: 1s</text>
  <text x="600" y="282" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">Attempt 2: 2s</text>
  <text x="600" y="302" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">Attempt 3: 4s</text>
  <text x="600" y="340" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">Formula: delay = 2ⁿ seconds</text>

</svg>