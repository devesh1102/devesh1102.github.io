  <text x="750" y="152" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">offline</text>
  <rect x="565" y="185" width="140" height="44" rx="8" fill="#1f6feb" stroke="#30363d" stroke-width="1.2"/>
  <text x="635.0" y="206.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">WS Server B</text>
  <text x="635.0" y="221.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">WebSocket</text>
  <rect x="745" y="185" width="130" height="44" rx="8" fill="#3fb950" stroke="#30363d" stroke-width="1.2"/>
  <text x="810.0" y="206.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Cassandra</text>
  <text x="810.0" y="221.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">Offline store</text>
  <line x1="620" y1="118" x2="620" y2="183" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="700" y1="94" x2="760" y2="183" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="565" y="295" width="140" height="44" rx="8" fill="#58a6ff" stroke="#30363d" stroke-width="1.2"/>
  <text x="635.0" y="322.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Recipient</text>
  <line x1="635" y1="229" x2="635" y2="293" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="30" y="300" width="14" height="14" rx="3" fill="#1f6feb"/>
  <text x="50" y="312" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">WebSocket Servers</text>
  <rect x="30" y="325" width="14" height="14" rx="3" fill="#f0883e"/>
  <text x="50" y="337" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">Kafka (message bus)</text>
  <rect x="30" y="350" width="14" height="14" rx="3" fill="#a371f7"/>
  <text x="50" y="362" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">Redis (presence)</text>
  <rect x="30" y="375" width="14" height="14" rx="3" fill="#3fb950"/>
  <text x="50" y="387" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#8b949e">Cassandra (storage)</text>

</svg>