  <text x="166.5" y="85.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">WebSocket</text>
  <line x1="335" y1="94" x2="398" y2="94" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="366.5" y="85.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">publish</text>
  <line x1="510" y1="94" x2="563" y2="94" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
