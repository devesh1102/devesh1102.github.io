  <text x="85.0" y="99.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Client</text>
  <rect x="195" y="70" width="140" height="48" rx="8" fill="#1f6feb" stroke="#30363d" stroke-width="1.2"/>
  <text x="265.0" y="93.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">WS Server A</text>
  <text x="265.0" y="108.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">WebSocket</text>
  <rect x="400" y="70" width="110" height="48" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="455.0" y="99.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#e6edf3" font-weight="600">Kafka</text>
  <rect x="565" y="70" width="140" height="48" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.2"/>
  <text x="635.0" y="99.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#58a6ff" font-weight="600">Message Router</text>
