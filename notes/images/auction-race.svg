<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <title>Race Condition — Problem vs Solution</title>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b949e"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f85149"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3fb950"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f0883e"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/></marker>
  </defs>
  <rect width="900" height="460" fill="#0d1117"/>
  <text x="450" y="30" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="16" font-weight="700" text-anchor="middle">Race Condition — Problem vs Solution</text>
  <!-- LEFT: Problem panel -->
  <rect x="20" y="48" width="415" height="390" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <rect x="20" y="48" width="415" height="36" rx="10" fill="#2d0f0f"/>
  <text x="227" y="72" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Without Protection (Race Condition)</text>
  <!-- DB -->
  <rect x="167" y="102" width="110" height="40" rx="6" fill="#0f2318" stroke="#3fb950" stroke-width="1.2"/>
  <text x="222" y="120" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Database</text>
  <text x="222" y="136" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="11" text-anchor="middle">current_bid = $100</text>
  <!-- User A and B read -->
  <rect x="45" y="170" width="100" height="38" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="95" y="188" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">User A</text>
  <text x="95" y="202" fill="#cdd9e5" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">reads $100</text>
  <rect x="303" y="170" width="100" height="38" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="353" y="188" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">User B</text>
  <text x="353" y="202" fill="#cdd9e5" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">reads $100</text>
  <line x1="167" y1="122" x2="147" y2="170" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="277" y1="122" x2="305" y2="170" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- Decide -->
  <rect x="45" y="235" width="100" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="95" y="252" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">decides to bid</text>
  <text x="95" y="267" fill="#58a6ff" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">$110</text>
  <rect x="303" y="235" width="100" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="353" y="252" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">decides to bid</text>
  <text x="353" y="267" fill="#58a6ff" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">$110</text>
  <line x1="95" y1="208" x2="95" y2="233" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="353" y1="208" x2="353" y2="233" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- Both write -->
  <rect x="45" y="300" width="100" height="42" rx="6" fill="#1a2a1a" stroke="#3fb950" stroke-width="1"/>
  <text x="95" y="318" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">writes $110</text>
  <text x="95" y="335" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">ACCEPTED</text>
  <rect x="303" y="300" width="100" height="42" rx="6" fill="#1a2a1a" stroke="#3fb950" stroke-width="1"/>
  <text x="353" y="318" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">writes $110</text>
  <text x="353" y="335" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">ACCEPTED</text>
  <line x1="95" y1="273" x2="95" y2="298" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="353" y1="273" x2="353" y2="298" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <!-- Boom -->
  <rect x="128" y="365" width="192" height="46" rx="8" fill="#2d0f0f" stroke="#f85149" stroke-width="2"/>
  <text x="224" y="385" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">BOTH WIN!</text>
  <text x="224" y="403" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">Lost update — data corrupted</text>
  <line x1="145" y1="342" x2="190" y2="363" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="305" y1="342" x2="258" y2="363" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrR)"/>
  <!-- RIGHT: Solution panel -->
  <rect x="465" y="48" width="415" height="390" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="465" y="48" width="415" height="36" rx="10" fill="#0f2318"/>
  <text x="672" y="72" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Kafka Partition Serialisation (Solution)</text>
  <!-- Three users arriving -->
  <rect x="480" y="100" width="75" height="38" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="517" y="117" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">User A</text>
  <text x="517" y="131" fill="#cdd9e5" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">bid $110</text>
  <rect x="597" y="100" width="75" height="38" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="634" y="117" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">User B</text>
  <text x="634" y="131" fill="#cdd9e5" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">bid $110</text>
  <rect x="714" y="100" width="75" height="38" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="751" y="117" fill="#fff" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="600" text-anchor="middle">User C</text>
  <text x="751" y="131" fill="#cdd9e5" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">bid $115</text>
  <!-- Kafka queue -->
  <rect x="480" y="168" width="310" height="50" rx="8" fill="#2d1f0e" stroke="#f0883e" stroke-width="1.5"/>
  <text x="635" y="188" fill="#f0883e" font-family="Inter,-apple-system,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Kafka Partition (key=auctionId)</text>
  <text x="635" y="206" fill="#e6edf3" font-family="Inter,-apple-system,sans-serif" font-size="11" text-anchor="middle">[A:$110] then [B:$110] then [C:$115]</text>
  <line x1="517" y1="138" x2="517" y2="166" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="634" y1="138" x2="634" y2="166" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <line x1="751" y1="138" x2="751" y2="166" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <!-- Processor -->
  <rect x="555" y="248" width="160" height="42" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="635" y="267" fill="#58a6ff" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Bid Processor</text>
  <text x="635" y="283" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">processes 1 at a time</text>
  <line x1="635" y1="218" x2="635" y2="246" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrB)"/>
  <!-- Results -->
  <rect x="480" y="318" width="95" height="48" rx="6" fill="#0f2318" stroke="#3fb950" stroke-width="1"/>
  <text x="527" y="337" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">A: $110</text>
  <text x="527" y="353" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">ACCEPTED</text>
  <text x="527" y="362" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">110 > 100</text>
  <rect x="590" y="318" width="95" height="48" rx="6" fill="#2d0f0f" stroke="#f85149" stroke-width="1"/>
  <text x="637" y="337" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">B: $110</text>
  <text x="637" y="353" fill="#f85149" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">REJECTED</text>
  <text x="637" y="362" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">110 = 110, not higher</text>
  <rect x="700" y="318" width="95" height="48" rx="6" fill="#0f2318" stroke="#3fb950" stroke-width="1"/>
  <text x="747" y="337" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">C: $115</text>
  <text x="747" y="353" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">ACCEPTED</text>
  <text x="747" y="362" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="9" text-anchor="middle">115 > 110</text>
  <line x1="605" y1="290" x2="527" y2="316" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="635" y1="290" x2="635" y2="316" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="665" y1="290" x2="747" y2="316" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <!-- Win label -->
  <text x="635" y="392" fill="#3fb950" font-family="Inter,-apple-system,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Exactly ONE winner — always clean</text>
  <text x="635" y="410" fill="#8b949e" font-family="Inter,-apple-system,sans-serif" font-size="10" text-anchor="middle">No concurrent writes to same auction — race eliminated</text>
</svg>
