<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <title>Twitter Fan-out Strategy Comparison</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
  </defs>
  <!-- background -->
  <rect width="900" height="400" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#e6edf3" font-weight="700">Twitter — Fan-out Strategy Comparison</text>
  <rect x="30" y="50" width="270" height="34" rx="8" fill="#f85149" opacity="0.2"/>
  <rect x="30" y="50" width="270" height="34" rx="8" fill="none" stroke="#f85149" stroke-width="1.5"/>
  <text x="165.0" y="73" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#f85149" font-weight="700">Fan-out on Write (Push)</text>
  <rect x="30" y="100" width="270" height="34" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="165.0" y="122.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Tweet posted</text>
  <line x1="165.0" y1="134" x2="165.0" y2="156" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="165.0" y="153" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">write immediately to each</text>
  <rect x="30" y="162" width="76" height="44" rx="6" fill="#a371f7" opacity="0.85" stroke="#30363d" stroke-width="1"/>
  <text x="68.0" y="181" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#e6edf3" font-weight="600">Follower 1</text>
  <text x="68.0" y="197" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">Redis</text>
  <rect x="111" y="162" width="76" height="44" rx="6" fill="#a371f7" opacity="0.85" stroke="#30363d" stroke-width="1"/>
  <text x="149.0" y="181" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#e6edf3" font-weight="600">Follower 2</text>
  <text x="149.0" y="197" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">Redis</text>
  <rect x="192" y="162" width="76" height="44" rx="6" fill="#a371f7" opacity="0.85" stroke="#30363d" stroke-width="1"/>
  <text x="230.0" y="181" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#e6edf3" font-weight="600">Follower N</text>
  <text x="230.0" y="197" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">Redis</text>
  <text x="165.0" y="232" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#3fb950">✅ Fast reads</text>
  <text x="165.0" y="255" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">❌ 150M writes on</text>
  <text x="165.0" y="272" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">celebrity tweet</text>
  <line x1="315" y1="48" x2="315" y2="380" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="315" y="50" width="270" height="34" rx="8" fill="#f0883e" opacity="0.2"/>
  <rect x="315" y="50" width="270" height="34" rx="8" fill="none" stroke="#f0883e" stroke-width="1.5"/>
  <text x="450.0" y="73" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#f0883e" font-weight="700">Fan-out on Read (Pull)</text>
  <rect x="315" y="100" width="270" height="34" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="450.0" y="122.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Tweet posted</text>
  <line x1="450.0" y1="134" x2="450.0" y2="155" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="315" y="161" width="270" height="34" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="450.0" y="183.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">tweets table (DB)</text>
  <line x1="450.0" y1="195" x2="450.0" y2="218" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="540.0" y="200.5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">fetch followees at read</text>
  <rect x="315" y="220" width="270" height="34" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.2"/>
  <text x="450.0" y="242.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Merge + Sort</text>
  <text x="450.0" y="278" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#3fb950">✅ Cheap writes</text>
  <text x="450.0" y="300" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">❌ Slow reads</text>
  <text x="450.0" y="317" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f85149">(N DB queries per user)</text>
  <line x1="600" y1="48" x2="600" y2="380" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="600" y="50" width="270" height="34" rx="8" fill="#3fb950" opacity="0.2"/>
  <rect x="600" y="50" width="270" height="34" rx="8" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="735.0" y="73" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#3fb950" font-weight="700">Hybrid (Twitter's Approach) ★</text>
  <rect x="600" y="100" width="270" height="34" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="735.0" y="122.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Tweet posted</text>
  <line x1="735.0" y1="134" x2="735.0" y2="155" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="600" y="161" width="270" height="34" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.2"/>
  <text x="735.0" y="183.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Is celebrity?</text>
  <text x="630" y="222" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">No →</text>
  <rect x="656" y="209" width="120" height="28" rx="6" fill="#a371f7" opacity="0.8" stroke="#30363d" stroke-width="1"/>
  <text x="716" y="228" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#e6edf3">Push to Redis timelines</text>
  <text x="630" y="262" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">Yes →</text>
  <rect x="660" y="249" width="110" height="28" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="715" y="268" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">Skip push → fetch at read</text>
  <text x="735.0" y="308" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#3fb950">✅ Best of both worlds</text>

</svg>