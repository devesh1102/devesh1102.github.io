<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <title>YouTube Upload and Serving Pipeline</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
  </defs>
  <!-- background -->
  <rect width="900" height="340" fill="#0d1117"/>
  <text x="450" y="30" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#e6edf3" font-weight="700">YouTube — Upload &amp; Serving Pipeline</text>
  <rect x="30" y="60" width="110" height="42" rx="8" fill="#58a6ff" stroke="#30363d" stroke-width="1.2"/>
  <text x="85.0" y="86.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Creator</text>
  <rect x="220" y="60" width="110" height="42" rx="8" fill="#1f6feb" stroke="#30363d" stroke-width="1.2"/>
  <text x="275.0" y="80.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Upload Service</text>
  <text x="275.0" y="95.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">pre-signed URL</text>
  <rect x="420" y="60" width="110" height="42" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="475.0" y="80.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">S3 Raw</text>
  <text x="475.0" y="95.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">Raw bucket</text>
  <line x1="140" y1="81" x2="218" y2="81" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="179.0" y="71.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">1. request URL</text>
  <path d="M 275.0 102 Q 275.0 132 85.0 132 Q 45.0 132 45.0 117" stroke="#8b949e" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="180.0" y="150" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#8b949e">2. pre-signed URL</text>
  <line x1="330" y1="81" x2="418" y2="81" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="374.0" y="71.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">3. direct upload</text>
  <line x1="475.0" y1="102" x2="475.0" y2="173" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="505.0" y="137.5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">4. trigger</text>
  <rect x="420" y="175" width="110" height="42" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="475.0" y="201.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Kafka</text>
  <rect x="600" y="171" width="90" height="34" rx="6" fill="#a371f7" stroke="#30363d" stroke-width="1" opacity="0.75"/>
  <text x="645" y="193.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">FFmpeg 360p</text>
  <rect x="600" y="210" width="90" height="34" rx="6" fill="#a371f7" stroke="#30363d" stroke-width="1" opacity="0.83"/>
  <text x="645" y="232.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">FFmpeg 720p</text>
  <rect x="600" y="249" width="90" height="34" rx="6" fill="#a371f7" stroke="#30363d" stroke-width="1" opacity="0.91"/>
  <text x="645" y="271.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">FFmpeg 1080p</text>
  <text x="645" y="161" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">Workers (parallel)</text>
  <rect x="750" y="175" width="120" height="42" rx="8" fill="#f0883e" stroke="#30363d" stroke-width="1.2"/>
  <text x="810.0" y="195.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">S3 Processed</text>
  <text x="810.0" y="210.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">HLS segments</text>
  <rect x="920" y="175" width="100" height="42" rx="8" fill="#3fb950" stroke="#30363d" stroke-width="1.2"/>
  <text x="970.0" y="201.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">CDN Edge</text>
  <rect x="1060" y="175" width="90" height="42" rx="8" fill="#58a6ff" stroke="#30363d" stroke-width="1.2"/>
  <text x="1105.0" y="201.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Viewer</text>
  <line x1="530" y1="196" x2="598" y2="196" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="690" y1="196" x2="748" y2="196" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="870" y1="196" x2="918" y2="196" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="1020" y1="196" x2="1058" y2="196" stroke="#8b949e" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="1039.0" y="186.0" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#8b949e">stream</text>

</svg>